name: Primex Auto Deploy

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: self-hosted
    env:
      PM2_HOME: C:\pm2-system
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          clean: false
          fetch-depth: 0

      - name: Configure Server Tooling
        shell: powershell
        run: |
          "C:\npm-global" | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8

      - name: Force Sync with GitHub
        shell: cmd
        run: |
          git fetch origin main
          git reset --hard origin/main

      - name: Detect Changed Files
        id: changes
        shell: powershell
        run: |
          $before = "${{ github.event.before }}"
          $after = "${{ github.sha }}"
          if ([string]::IsNullOrWhiteSpace($before) -or $before -eq "0000000000000000000000000000000000000000") {
            try {
              $before = (git rev-parse "$after^").Trim()
            } catch {
              $before = $after
            }
          }

          $changedFiles = @(git diff --name-only $before $after | Where-Object { $_ -and $_.Trim() -ne "" })
          Write-Host "Comparing commits: $before -> $after"
          Write-Host "Changed files:"
          if ($changedFiles.Count -eq 0) {
            Write-Host " - <none>"
          } else {
            $changedFiles | ForEach-Object { Write-Host " - $_" }
          }

          $backendChanged = $false
          $frontendChanged = $false
          $migrationChanged = $false

          foreach ($file in $changedFiles) {
            if ($file -like "backend/*") {
              $backendChanged = $true
            }
            if ($file -like "frontend/*") {
              $frontendChanged = $true
            }
            if ($file -like "backend/alembic/versions/*") {
              $migrationChanged = $true
            }
          }

          "backend_changed=$($backendChanged.ToString().ToLowerInvariant())" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "frontend_changed=$($frontendChanged.ToString().ToLowerInvariant())" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "migration_changed=$($migrationChanged.ToString().ToLowerInvariant())" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Create Env Files
        shell: cmd
        run: |
          echo NEXT_PUBLIC_API_BASE_URL=https://api-flow.primexeu.com > frontend/.env.local
          echo DATABASE_URL=postgresql+asyncpg://postgres:12345678@localhost:5433/primex_nexus > backend/.env
          echo DB_POOL_SIZE=20 >> backend/.env
          echo DB_MAX_OVERFLOW=20 >> backend/.env
          echo DB_POOL_TIMEOUT=30 >> backend/.env
          echo DB_POOL_RECYCLE=1800 >> backend/.env
          echo JWT_SECRET=primex_nexus_secret_key_2026 >> backend/.env
          echo REDIS_ENABLED=false >> backend/.env
          echo REDIS_URL=redis://127.0.0.1:6379/0 >> backend/.env
          echo APP_TIMEZONE=Europe/Budapest >> backend/.env
          echo CORS_ORIGINS=https://primeflow.primexeu.com,https://api-flow.primexeu.com >> backend/.env
          echo FRONTEND_URL=https://primeflow.primexeu.com >> backend/.env

      - name: Database Migration Notice
        if: ${{ steps.changes.outputs.migration_changed == 'true' }}
        shell: powershell
        run: |
          Write-Warning "Alembic auto-migration is disabled in deploy. Apply DB SQL manually in pgAdmin before or after this deploy as needed."

      - name: Deploy Backend APIs
        if: ${{ steps.changes.outputs.backend_changed == 'true' }}
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          if (Get-Variable -Name PSNativeCommandUseErrorActionPreference -ErrorAction SilentlyContinue) {
            $PSNativeCommandUseErrorActionPreference = $false
          }

          $pythonCandidates = @(
            $env:PM2_PYTHON_PATH,
            "C:\Users\Administrator\AppData\Local\Programs\Python\Python313\python.exe",
            "C:\Users\Administrator\AppData\Local\Programs\Python\Python311\python.exe"
          ) | Where-Object { $_ -and (Test-Path $_) }
          $python = $pythonCandidates | Select-Object -First 1
          if (-not $python) {
            throw "Python not found. Set PM2_PYTHON_PATH or install Python 3.11/3.13."
          }
          Write-Host "Using Python: $python"
          $env:PM2_PYTHON_PATH = $python
          Set-Location backend

          function Invoke-Pm2Optional {
            param([string]$Command)
            Write-Host "PM2: $Command"
            cmd /c "$Command 2>nul || exit /b 0" | Out-Host
          }

          function Invoke-Pm2Required {
            param([string]$Command)
            Write-Host "PM2: $Command"
            cmd /c $Command
            if ($LASTEXITCODE -ne 0) {
              throw "PM2 command failed (exit $LASTEXITCODE): $Command"
            }
          }

          Write-Host "Installing Python dependencies..."
          & $python -m pip install -r requirements.txt
          if ($LASTEXITCODE -ne 0) { throw "pip install failed" }

          $env:REDIS_ENABLED = "false"
          $env:REDIS_URL = "redis://127.0.0.1:6379/0"
          $env:APP_TIMEZONE = "Europe/Budapest"

          Write-Host "Stopping Celery processes (ignore if not registered)..."
          Invoke-Pm2Optional "pm2 stop celery_worker"
          Invoke-Pm2Optional "pm2 stop celery_beat"

          Write-Host "Stopping backend processes (ignore if not registered)..."
          foreach ($name in @(
            "backend-api",
            "backend",
            "backend-api-flow",
            "primex-backend",
            "primex-public-api"
          )) {
            Invoke-Pm2Optional "pm2 stop $name"
          }

          Write-Host "Removing backend PM2 processes (ignore if not registered)..."
          foreach ($name in @(
            "backend-api",
            "backend",
            "backend-api-flow",
            "primex-backend",
            "primex-public-api"
          )) {
            Invoke-Pm2Optional "pm2 delete $name"
          }

          Start-Sleep -Seconds 3

          function Clear-ApiListenPort {
            param([int]$Port)
            $connections = @(Get-NetTCPConnection -LocalPort $Port -State Listen -ErrorAction SilentlyContinue)
            foreach ($connection in $connections) {
              $ownerProcessId = $connection.OwningProcess
              if (-not $ownerProcessId) { continue }
              $process = Get-CimInstance Win32_Process -Filter "ProcessId = $ownerProcessId" -ErrorAction SilentlyContinue
              $commandLine = $process.CommandLine
              Write-Host "Freeing port ${Port}: stopping PID $ownerProcessId ($commandLine)"
              Stop-Process -Id $ownerProcessId -Force -ErrorAction SilentlyContinue
            }
          }

          function Wait-ForPortFree {
            param(
              [int]$Port,
              [int]$Attempts = 20
            )
            for ($i = 0; $i -lt $Attempts; $i++) {
              Clear-ApiListenPort -Port $Port
              $listeners = @(Get-NetTCPConnection -LocalPort $Port -State Listen -ErrorAction SilentlyContinue)
              if ($listeners.Count -eq 0) {
                Write-Host "Port $Port is free"
                return $true
              }
              Write-Host "Port $Port still in use (attempt $($i + 1)/$Attempts)"
              Start-Sleep -Seconds 2
            }
            foreach ($connection in @(Get-NetTCPConnection -LocalPort $Port -State Listen -ErrorAction SilentlyContinue)) {
              $ownerProcessId = $connection.OwningProcess
              $process = Get-CimInstance Win32_Process -Filter "ProcessId = $ownerProcessId" -ErrorAction SilentlyContinue
              Write-Host "Port $Port blocked by PID $ownerProcessId : $($process.CommandLine)"
            }
            return $false
          }

          if (-not (Wait-ForPortFree -Port 8000)) {
            throw "Port 8000 is still in use."
          }
          if (-not (Wait-ForPortFree -Port 8080)) {
            throw "Port 8080 is still in use."
          }

          Write-Host "Starting primex-backend on port 8000..."
          Invoke-Pm2Required "pm2 start ecosystem.config.cjs --only primex-backend --update-env"

          function Wait-ApiHealth {
            param(
              [string]$Uri,
              [string]$Pm2ProcessName,
              [int]$Attempts = 30
            )
            for ($i = 0; $i -lt $Attempts; $i++) {
              try {
                $resp = Invoke-WebRequest -Uri $Uri -UseBasicParsing -TimeoutSec 3
                Write-Host "${Pm2ProcessName} health attempt $($i + 1)/${Attempts}: HTTP $($resp.StatusCode)"
                if ($resp.StatusCode -eq 200) {
                  Write-Host "Health check OK: $Uri"
                  return $true
                }
              } catch {
                Write-Host "${Pm2ProcessName} health attempt $($i + 1)/${Attempts}: no response yet"
                Start-Sleep -Seconds 2
              }
            }
            Write-Host "=== pm2 describe $Pm2ProcessName ==="
            cmd /c "pm2 describe $Pm2ProcessName" | Out-Host
            Write-Host "=== pm2 logs $Pm2ProcessName (last 80 lines) ==="
            cmd /c "pm2 logs $Pm2ProcessName --lines 80 --nostream" | Out-Host
            return $false
          }

          if (-not (Wait-ApiHealth -Uri "http://127.0.0.1:8000/health" -Pm2ProcessName "primex-backend")) {
            throw "Backend /health did not become ready on port 8000."
          }

          if (-not (Wait-ForPortFree -Port 8080)) {
            throw "Port 8080 became busy before starting primex-public-api."
          }
          Write-Host "Starting primex-public-api on port 8080..."
          Invoke-Pm2Required "pm2 start ecosystem.config.cjs --only primex-public-api --update-env"

          cmd /c "pm2 describe primex-backend" | Out-Host
          cmd /c "pm2 describe primex-public-api" | Out-Host

          if (-not (Wait-ApiHealth -Uri "http://127.0.0.1:8080/health" -Pm2ProcessName "primex-public-api")) {
            throw "Public API /health did not become ready on port 8080."
          }

      - name: Update Frontend
        if: ${{ steps.changes.outputs.frontend_changed == 'true' }}
        shell: powershell
        run: |
          Set-Location frontend

          Write-Host "1. Installing Dependencies..."
          npm install
          if ($LASTEXITCODE -ne 0) { Write-Error "NPM Install Failed"; exit 1 }

          Write-Host "2. Stopping Existing Frontend Process..."
          $pm2Describe = Start-Process -FilePath "cmd.exe" -ArgumentList "/c", "pm2 describe frontend > NUL 2>&1" -NoNewWindow -Wait -PassThru
          if ($pm2Describe.ExitCode -eq 0) {
            $pm2Delete = Start-Process -FilePath "cmd.exe" -ArgumentList "/c", "pm2 delete frontend" -NoNewWindow -Wait -PassThru
            if ($pm2Delete.ExitCode -ne 0) { Write-Error "PM2 frontend delete failed"; exit 1 }
          } else {
            Write-Host "PM2 frontend process did not exist yet. Continuing with clean start."
          }

          Write-Host "3. Cleaning Old Build..."
          if (Test-Path .next) {
            Remove-Item .next -Recurse -Force -ErrorAction SilentlyContinue
            if (Test-Path .next) {
              Start-Sleep -Seconds 2
              Remove-Item .next -Recurse -Force
            }
          }

          Write-Host "4. Building New Version (This takes time)..."
          npm run build
          if ($LASTEXITCODE -ne 0) { Write-Error "Build Failed"; exit 1 }

          Write-Host "5. Starting Frontend Process..."
          $CurrentPath = (Get-Location).Path
          $pm2Start = Start-Process -FilePath "cmd.exe" -ArgumentList "/c", "pm2 start node_modules/next/dist/bin/next --name frontend --cwd ""$CurrentPath"" --interpreter node -- start --port 3000" -NoNewWindow -Wait -PassThru
          if ($pm2Start.ExitCode -ne 0) { Write-Error "PM2 frontend start failed"; exit 1 }

      - name: Wait for Frontend Readiness
        if: ${{ steps.changes.outputs.frontend_changed == 'true' }}
        shell: powershell
        run: |
          $ok = $false
          $uri = "http://127.0.0.1:3000/dashboard"
          for ($i = 0; $i -lt 20; $i++) {
            try {
              $resp = Invoke-WebRequest -Uri $uri -UseBasicParsing -TimeoutSec 3
              Write-Host "Frontend readiness attempt $($i + 1)/20: HTTP $($resp.StatusCode)"
              if ($resp.StatusCode -eq 200) {
                $ok = $true
                break
              }
            } catch {
              Write-Host "Frontend readiness attempt $($i + 1)/20: no response yet"
              Start-Sleep -Seconds 2
            }
          }
          if (-not $ok) {
            Write-Error "Frontend did not become ready on port 3000."
            exit 1
          }
          Write-Host "Frontend readiness check: OK ($uri)"

      - name: Save PM2 Process List
        shell: cmd
        run: |
          pm2 save

      - name: Deploy Observability
        shell: cmd
        run: |
          call pm2 status
          call pm2 logs primex-backend --lines 50 --nostream || ver > NUL
          call pm2 logs primex-public-api --lines 50 --nostream || ver > NUL
