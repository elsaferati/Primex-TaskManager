name: Primex Auto Deploy

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          clean: false
          fetch-depth: 0

      - name: Force Sync with GitHub
        shell: cmd
        run: |
          git fetch origin main
          git reset --hard origin/main

      - name: Detect Changed Files
        id: changes
        shell: powershell
        run: |
          $before = "${{ github.event.before }}"
          $after = "${{ github.sha }}"
          if ([string]::IsNullOrWhiteSpace($before) -or $before -eq "0000000000000000000000000000000000000000") {
            try {
              $before = (git rev-parse "$after^").Trim()
            } catch {
              $before = $after
            }
          }

          $changedFiles = @(git diff --name-only $before $after | Where-Object { $_ -and $_.Trim() -ne "" })
          Write-Host "Comparing commits: $before -> $after"
          Write-Host "Changed files:"
          if ($changedFiles.Count -eq 0) {
            Write-Host " - <none>"
          } else {
            $changedFiles | ForEach-Object { Write-Host " - $_" }
          }

          $backendChanged = $false
          $frontendChanged = $false
          $workerChanged = $false
          $beatChanged = $false
          $migrationChanged = $false

          foreach ($file in $changedFiles) {
            if ($file -like "backend/*") {
              $backendChanged = $true
            }
            if ($file -like "frontend/*") {
              $frontendChanged = $true
            }
            if ($file -like "backend/alembic/versions/*") {
              $migrationChanged = $true
            }
            if (
              $file -eq "backend/app/celery_app.py" -or
              $file -eq "backend/app/celery_tasks.py" -or
              $file -like "backend/app/jobs/*" -or
              $file -eq "backend/app/services/system_task_instances.py" -or
              $file -eq "backend/app/services/system_task_schedule.py" -or
              $file -eq "backend/requirements.txt"
            ) {
              $workerChanged = $true
            }
            if (
              $file -eq "backend/app/celery_app.py" -or
              $file -eq "backend/app/celery_tasks.py" -or
              $file -like "backend/app/jobs/*"
            ) {
              $beatChanged = $true
            }
          }

          "backend_changed=$($backendChanged.ToString().ToLowerInvariant())" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "frontend_changed=$($frontendChanged.ToString().ToLowerInvariant())" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "worker_related_changed=$($workerChanged.ToString().ToLowerInvariant())" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "beat_related_changed=$($beatChanged.ToString().ToLowerInvariant())" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "migration_changed=$($migrationChanged.ToString().ToLowerInvariant())" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Create Env Files
        shell: cmd
        run: |
          echo NEXT_PUBLIC_API_URL=https://api-flow.primexeu.com > frontend/.env.local
          echo DATABASE_URL=postgresql+asyncpg://postgres:12345678@localhost:5433/primex_nexus > backend/.env
          echo JWT_SECRET=primex_nexus_secret_key_2026 >> backend/.env
          echo REDIS_ENABLED=true >> backend/.env
          echo REDIS_URL=redis://localhost:6379/0 >> backend/.env
          echo APP_TIMEZONE=Europe/Budapest >> backend/.env
          echo CORS_ORIGINS=https://primeflow.primexeu.com,https://api-flow.primexeu.com >> backend/.env

      - name: Database Migration Notice
        if: ${{ steps.changes.outputs.migration_changed == 'true' }}
        shell: powershell
        run: |
          Write-Warning "Alembic auto-migration is disabled in deploy. Apply DB SQL manually in pgAdmin before or after this deploy as needed."

      - name: Update Backend
        if: ${{ steps.changes.outputs.backend_changed == 'true' }}
        shell: cmd
        run: |
          cd backend
          "C:\Users\Administrator\AppData\Local\Programs\Python\Python313\python.exe" -m pip install -r requirements.txt

          REM Database migrations are manual in pgAdmin (no alembic auto-run in deploy).

          REM Restart or start backend API process
          call pm2 restart backend || call pm2 start "C:\Users\Administrator\AppData\Local\Programs\Python\Python313\python.exe" --name backend -- -m uvicorn app.main:app --host 0.0.0.0 --port 8000

      - name: Wait for Backend Readiness
        if: ${{ steps.changes.outputs.backend_changed == 'true' }}
        shell: powershell
        run: |
          $ok = $false
          for ($i = 0; $i -lt 20; $i++) {
            try {
              $resp = Invoke-WebRequest -Uri "http://127.0.0.1:8000/docs" -UseBasicParsing -TimeoutSec 3
              if ($resp.StatusCode -ge 200 -and $resp.StatusCode -lt 500) {
                $ok = $true
                break
              }
            } catch {
              Start-Sleep -Seconds 2
            }
          }
          if (-not $ok) {
            Write-Error "Backend did not become ready after restart."
            exit 1
          }

      - name: Update Celery Worker
        if: ${{ steps.changes.outputs.worker_related_changed == 'true' }}
        shell: cmd
        run: |
          cd backend
          call pm2 restart celery_worker || call pm2 start "C:\Users\Administrator\AppData\Local\Programs\Python\Python313\python.exe" --name celery_worker -- -m celery -A app.celery_app.celery_app worker --loglevel=info

      - name: Update Celery Beat
        if: ${{ steps.changes.outputs.beat_related_changed == 'true' }}
        shell: cmd
        run: |
          cd backend
          call pm2 restart celery_beat || call pm2 start "C:\Users\Administrator\AppData\Local\Programs\Python\Python313\python.exe" --name celery_beat -- -m celery -A app.celery_app.celery_app beat --loglevel=info

      - name: Update Frontend
        if: ${{ steps.changes.outputs.frontend_changed == 'true' }}
        shell: powershell
        run: |
          Set-Location frontend

          Write-Host "1. Installing Dependencies..."
          npm install
          if ($LASTEXITCODE -ne 0) { Write-Error "NPM Install Failed"; exit 1 }

          Write-Host "2. Cleaning Old Build..."
          if (Test-Path .next) { Remove-Item .next -Recurse -Force }

          Write-Host "3. Building New Version (This takes time)..."
          npm run build
          if ($LASTEXITCODE -ne 0) { Write-Error "Build Failed"; exit 1 }

          Write-Host "4. Restarting Frontend..."
          $CurrentPath = (Get-Location).Path
          cmd /c "pm2 restart frontend || pm2 start node_modules/next/dist/bin/next --name frontend --cwd ""$CurrentPath"" -- start"

      - name: Save PM2 Process List
        if: ${{ steps.changes.outputs.backend_changed == 'true' || steps.changes.outputs.frontend_changed == 'true' || steps.changes.outputs.worker_related_changed == 'true' || steps.changes.outputs.beat_related_changed == 'true' }}
        shell: cmd
        run: |
          pm2 save

      - name: Deploy Observability
        shell: cmd
        run: |
          call pm2 status
          call pm2 logs backend --lines 50 --nostream || ver > NUL
          call pm2 logs celery_worker --lines 50 --nostream || ver > NUL
          call pm2 logs celery_beat --lines 50 --nostream || ver > NUL
