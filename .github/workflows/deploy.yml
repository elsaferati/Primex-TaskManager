name: Primex Auto Deploy
 
on:
  push:
    branches: [ main ]
 
jobs:
  deploy:
    runs-on: self-hosted
    env:
      PM2_HOME: C:\pm2-system
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          clean: false
          fetch-depth: 0
 
      - name: Configure Server Tooling
        shell: powershell
        run: |
          "C:\npm-global" | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8
 
      - name: Force Sync with GitHub
        shell: cmd
        run: |
          git fetch origin main
          git reset --hard origin/main
 
      - name: Detect Changed Files
        id: changes
        shell: powershell
        run: |
          $before = "${{ github.event.before }}"
          $after = "${{ github.sha }}"
          if ([string]::IsNullOrWhiteSpace($before) -or $before -eq "0000000000000000000000000000000000000000") {
            try {
              $before = (git rev-parse "$after^").Trim()
            } catch {
              $before = $after
            }
          }
 
          $changedFiles = @(git diff --name-only $before $after | Where-Object { $_ -and $_.Trim() -ne "" })
          Write-Host "Comparing commits: $before -> $after"
          Write-Host "Changed files:"
          if ($changedFiles.Count -eq 0) {
            Write-Host " - <none>"
          } else {
            $changedFiles | ForEach-Object { Write-Host " - $_" }
          }
 
          $backendChanged = $false
          $frontendChanged = $false
          $migrationChanged = $false
 
          foreach ($file in $changedFiles) {
            if ($file -like "backend/*") {
              $backendChanged = $true
            }
            if ($file -like "frontend/*") {
              $frontendChanged = $true
            }
            if ($file -eq ".github/workflows/deploy.yml") {
              $backendChanged = $true
              $frontendChanged = $true
            }
            if ($file -like "backend/alembic/versions/*") {
              $migrationChanged = $true
            }
          }
 
          "backend_changed=$($backendChanged.ToString().ToLowerInvariant())" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "frontend_changed=$($frontendChanged.ToString().ToLowerInvariant())" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "migration_changed=$($migrationChanged.ToString().ToLowerInvariant())" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
 
      - name: Create Env Files
        shell: powershell
        env:
          PRIMEFLOW_MCP_EMAIL: ${{ secrets.PRIMEFLOW_MCP_EMAIL }}
          PRIMEFLOW_MCP_PASSWORD: ${{ secrets.PRIMEFLOW_MCP_PASSWORD }}
        run: |
          "NEXT_PUBLIC_API_BASE_URL=https://api-flow.primexeu.com" | Set-Content -Path frontend/.env.local -Encoding utf8
          @(
            "DATABASE_URL=postgresql+asyncpg://postgres:12345678@localhost:5433/primex_nexus"
            "DB_POOL_SIZE=20"
            "DB_MAX_OVERFLOW=20"
            "DB_POOL_TIMEOUT=30"
            "DB_POOL_RECYCLE=1800"
            "JWT_SECRET=primex_nexus_secret_key_2026"
            "REDIS_ENABLED=false"
            "REDIS_URL=redis://127.0.0.1:6379/0"
            "APP_TIMEZONE=Europe/Budapest"
            "CORS_ORIGINS=https://primeflow.primexeu.com,https://api-flow.primexeu.com"
            "FRONTEND_URL=https://primeflow.primexeu.com"
            "PRIMEFLOW_API_BASE_URL=https://api-flow.primexeu.com"
            "PRIMEFLOW_WEB_BASE_URL=https://primeflow.primexeu.com"
            "PRIMEFLOW_MCP_TRANSPORT=sse"
            "PRIMEFLOW_MCP_HOST=0.0.0.0"
            "PRIMEFLOW_MCP_PORT=8010"
            "PRIMEFLOW_EMAIL=$env:PRIMEFLOW_MCP_EMAIL"
            "PRIMEFLOW_PASSWORD=$env:PRIMEFLOW_MCP_PASSWORD"
          ) | Set-Content -Path backend/.env -Encoding utf8
 
      - name: Database Migration Notice
        if: ${{ steps.changes.outputs.migration_changed == 'true' }}
        shell: powershell
        run: |
          Write-Warning "Alembic auto-migration is disabled in deploy. Apply DB SQL manually in pgAdmin before or after this deploy as needed."
 
      - name: Update Backend
        if: ${{ steps.changes.outputs.backend_changed == 'true' }}
        shell: cmd
        run: |
          cd backend
          "C:\Users\Administrator\AppData\Local\Programs\Python\Python313\python.exe" -m pip install -r requirements.txt
 
          REM Database migrations are manual in pgAdmin (no alembic auto-run in deploy).
 
          REM Redis is disabled in this environment, so keep Celery processes stopped.
          call pm2 stop celery_worker
          call pm2 stop celery_beat
 
          REM Stop legacy backend process names so the current checkout owns the API port.
          set REDIS_ENABLED=false
          set REDIS_URL=redis://127.0.0.1:6379/0
          set APP_TIMEZONE=Europe/Budapest
          set APP_BUILD_SHA=${{ github.sha }}
          call pm2 delete backend-api || ver > NUL
          call pm2 delete backend || ver > NUL
          call pm2 delete primex-backend || ver > NUL
          call pm2 delete primeflow-mcp || ver > NUL

          REM Kill any orphaned process still holding port 8000 (a squatter outside PM2
          REM keeps serving stale code and makes health checks pass against old builds).
          powershell -NoProfile -Command "Get-NetTCPConnection -LocalPort 8000 -State Listen -ErrorAction SilentlyContinue | Select-Object -ExpandProperty OwningProcess -Unique | ForEach-Object { Write-Host ('Killing stale listener PID ' + $_ + ' on port 8000'); Stop-Process -Id $_ -Force }"
          powershell -NoProfile -Command "Get-NetTCPConnection -LocalPort 8010 -State Listen -ErrorAction SilentlyContinue | Select-Object -ExpandProperty OwningProcess -Unique | ForEach-Object { Write-Host ('Killing stale listener PID ' + $_ + ' on port 8010'); Stop-Process -Id $_ -Force }"

          call pm2 start ecosystem.config.cjs --only primex-backend --update-env
          call pm2 start ecosystem.config.cjs --only primeflow-mcp --update-env
          call pm2 describe primex-backend | findstr /I "status"
          call pm2 describe primeflow-mcp | findstr /I "status"
          echo PM2 backend restart/start completed.
 
      - name: Wait for Backend Readiness
        if: ${{ steps.changes.outputs.backend_changed == 'true' }}
        shell: powershell
        run: |
          $ok = $false
          $expected = "${{ github.sha }}"
          $lastBuild = "<no response>"
          $uri = "http://127.0.0.1:8000/health"
          for ($i = 0; $i -lt 20; $i++) {
            try {
              $resp = Invoke-WebRequest -Uri $uri -UseBasicParsing -TimeoutSec 3
              $body = $resp.Content | ConvertFrom-Json
              $lastBuild = "$($body.build)"
              Write-Host "Backend health check attempt $($i + 1)/20: HTTP $($resp.StatusCode) build=$lastBuild"
              if ($resp.StatusCode -eq 200 -and $lastBuild -eq $expected) {
                $ok = $true
                break
              }
              Start-Sleep -Seconds 2
            } catch {
              Write-Host "Backend health check attempt $($i + 1)/20: no response yet"
              Start-Sleep -Seconds 2
            }
          }
          if (-not $ok) {
            Write-Error "Backend /health not serving deployed build $expected (last seen: $lastBuild). A stale process may be holding port 8000."
            exit 1
          }
          Write-Host "Backend health check: OK ($uri) serving build $expected"
 
      - name: Replace Public API Backend
        if: ${{ steps.changes.outputs.backend_changed == 'true' }}
        shell: powershell
        run: |
          Set-Location backend
 
          $python = "C:\Users\Administrator\AppData\Local\Programs\Python\Python313\python.exe"
          $port = 8080
          $processName = "backend-api-flow"
 
          Write-Host "Replacing public API backend on port $port from current checkout..."
          cmd /c "pm2 delete backend-api-flow || ver > NUL" | Out-Host
          cmd /c "pm2 delete primex-public-api || ver > NUL" | Out-Host

          # Kill any orphaned process still holding the port (a squatter outside PM2
          # keeps serving stale code and makes health checks pass against old builds).
          Get-NetTCPConnection -LocalPort $port -State Listen -ErrorAction SilentlyContinue |
            Select-Object -ExpandProperty OwningProcess -Unique |
            ForEach-Object {
              Write-Host "Killing stale listener PID $_ on port $port"
              Stop-Process -Id $_ -Force
            }

          $env:REDIS_ENABLED = "false"
          $env:REDIS_URL = "redis://127.0.0.1:6379/0"
          $env:APP_TIMEZONE = "Europe/Budapest"
          $env:APP_BUILD_SHA = "${{ github.sha }}"
          cmd /c "pm2 start `"$python`" --name $processName --cwd `"$PWD`" -- -m uvicorn app.main:app --host 0.0.0.0 --port $port"
          if ($LASTEXITCODE -ne 0) { Write-Error "PM2 public API start failed"; exit 1 }

          $ok = $false
          $expected = "${{ github.sha }}"
          $lastBuild = "<no response>"
          $uri = "http://127.0.0.1:$port/health"
          for ($i = 0; $i -lt 20; $i++) {
            try {
              $resp = Invoke-WebRequest -Uri $uri -UseBasicParsing -TimeoutSec 3
              $body = $resp.Content | ConvertFrom-Json
              $lastBuild = "$($body.build)"
              Write-Host "Public API health check attempt $($i + 1)/20: HTTP $($resp.StatusCode) build=$lastBuild"
              if ($resp.StatusCode -eq 200 -and $lastBuild -eq $expected) {
                $ok = $true
                break
              }
              Start-Sleep -Seconds 2
            } catch {
              Write-Host "Public API health check attempt $($i + 1)/20: no response yet"
              Start-Sleep -Seconds 2
            }
          }
          if (-not $ok) {
            Write-Error "Public API /health not serving deployed build $expected (last seen: $lastBuild). A stale process may be holding port $port."
            exit 1
          }
 
      - name: Update Frontend
        if: ${{ steps.changes.outputs.frontend_changed == 'true' }}
        shell: powershell
        run: |
          Set-Location frontend
 
          Write-Host "1. Installing Dependencies..."
          npm install
          if ($LASTEXITCODE -ne 0) { Write-Error "NPM Install Failed"; exit 1 }
 
          Write-Host "2. Stopping Existing Frontend Process..."
          $pm2Describe = Start-Process -FilePath "cmd.exe" -ArgumentList "/c", "pm2 describe frontend > NUL 2>&1" -NoNewWindow -Wait -PassThru
          if ($pm2Describe.ExitCode -eq 0) {
            $pm2Delete = Start-Process -FilePath "cmd.exe" -ArgumentList "/c", "pm2 delete frontend" -NoNewWindow -Wait -PassThru
            if ($pm2Delete.ExitCode -ne 0) { Write-Error "PM2 frontend delete failed"; exit 1 }
          } else {
            Write-Host "PM2 frontend process did not exist yet. Continuing with clean start."
          }
 
          Write-Host "3. Cleaning Old Build..."
          if (Test-Path .next) {
            Remove-Item .next -Recurse -Force -ErrorAction SilentlyContinue
            if (Test-Path .next) {
              Start-Sleep -Seconds 2
              Remove-Item .next -Recurse -Force
            }
          }
 
          Write-Host "4. Building New Version (This takes time)..."
          npm run build
          if ($LASTEXITCODE -ne 0) { Write-Error "Build Failed"; exit 1 }
 
          Write-Host "5. Starting Frontend Process..."
          $CurrentPath = (Get-Location).Path
          $pm2Start = Start-Process -FilePath "cmd.exe" -ArgumentList "/c", "pm2 start node_modules/next/dist/bin/next --name frontend --cwd ""$CurrentPath"" --interpreter node -- start --port 3000" -NoNewWindow -Wait -PassThru
          if ($pm2Start.ExitCode -ne 0) { Write-Error "PM2 frontend start failed"; exit 1 }
 
      - name: Wait for Frontend Readiness
        if: ${{ steps.changes.outputs.frontend_changed == 'true' }}
        shell: powershell
        run: |
          $ok = $false
          $uri = "http://127.0.0.1:3000/dashboard"
          for ($i = 0; $i -lt 20; $i++) {
            try {
              $resp = Invoke-WebRequest -Uri $uri -UseBasicParsing -TimeoutSec 3
              Write-Host "Frontend readiness attempt $($i + 1)/20: HTTP $($resp.StatusCode)"
              if ($resp.StatusCode -eq 200) {
                $ok = $true
                break
              }
            } catch {
              Write-Host "Frontend readiness attempt $($i + 1)/20: no response yet"
              Start-Sleep -Seconds 2
            }
          }
          if (-not $ok) {
            Write-Error "Frontend did not become ready on port 3000."
            exit 1
          }
          Write-Host "Frontend readiness check: OK ($uri)"
 
      - name: Save PM2 Process List
        shell: cmd
        run: |
          pm2 save
 
      - name: Deploy Observability
        shell: cmd
        run: |
          call pm2 status
          call pm2 logs primex-backend --lines 50 --nostream || ver > NUL
